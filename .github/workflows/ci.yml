name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Go-only — bridge/ is a separate npm workspace built by the `bridge` job
  # below, gated on its own path filter, so a Go-only change never pays the
  # npm install/build cost.
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Headless Chrome for the render/align e2e (required in CI, see below).
      - uses: browser-actions/setup-chrome@v2
        id: chrome

      - name: Verify formatting
        if: matrix.os == 'ubuntu-latest'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # FIGMA_MAP_E2E makes the e2e fail (not skip) if Chrome can't launch, so it
      # can never silently no-op in CI. CHROME_PATH points chromedp at the
      # action-installed binary.
      # e2e is required on Linux (reliable CI Chrome); on macOS it runs if Chrome
      # launches but won't block CI on runner Chrome quirks.
      - name: Test (with e2e)
        env:
          FIGMA_MAP_E2E: ${{ matrix.os == 'ubuntu-latest' && '1' || '' }}
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: go test -race -coverprofile=cover.out ./...

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: |
          go tool cover -func=cover.out | tail -1
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=cover.out | tail -1 >> "$GITHUB_STEP_SUMMARY"

      - name: Verify modules
        if: matrix.os == 'ubuntu-latest'
        run: go mod verify

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  vuln:
    name: govulncheck (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Informational: stdlib CVEs land regularly and are fixed by Go patch
      # releases. Surface them in the logs without gating merges on Go's timing.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck reported issues (informational)"

  release-config:
    name: goreleaser check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check

  bridge:
    name: bridge + backend (plugin + backend build)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
      - uses: tj-actions/changed-files@v46
        id: changed
        with:
          files: |
            bridge/**
            backend/**
      - if: steps.changed.outputs.any_changed != 'true'
        run: echo "no bridge/ or backend/ changes — skipping" && exit 0
      - if: steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: bridge/.nvmrc
      - if: steps.changed.outputs.any_changed == 'true'
        name: build plugin
        run: |
          cd bridge/plugin
          npm ci
          npm run build
      - if: steps.changed.outputs.any_changed == 'true'
        name: build backend
        run: |
          cd backend
          npm ci
          npm run build
