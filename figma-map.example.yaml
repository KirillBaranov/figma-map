# figma-map configuration. Copy to figma-map.yaml and adjust.
# The API key is NOT stored here — it is read from the environment variable
# named by llm.apiKeyEnv (default OPENAI_API_KEY).

# figma-bridge HTTP RPC server (backend/).
bridge: http://localhost:1994

# Path to a figma-map source checkout (containing backend/ and
# extensions/plugin/) — only needed to use `bridge up`/`bridge down`/
# `bridge status`, which start/stop/check that backend process for you.
# Leave empty if you start it yourself; every other command just talks to
# whatever's already listening on `bridge` above.
bridgeRepo: ""

# Running Storybook instance.
storybook: http://localhost:6007

# Default Figma file key. Leave empty to use the sole connected file, or pass
# --file on the command line.
fileKey: ""

llm:
  # OpenAI-compatible endpoint. Empty = api.openai.com. Point at the kb-labs
  # gateway or a local Ollama server (http://localhost:11434/v1) to use those.
  baseURL: ""
  # Vision-capable chat model.
  model: gpt-4o-mini
  # Environment variable holding the API key.
  apiKeyEnv: OPENAI_API_KEY

figma:
  # "bridge" (default) — live plugin via WebSocket, full feature set
  # including capture issues/compare. Requires Figma desktop open.
  # "rest" — Figma REST API, headless/CI-friendly, read-only. Requires a
  # Dev Mode/Enterprise-plan token and `fileKey` set above. Does not support
  # capture issues/verify pixeldiff-images/compare — see README Limitations.
  source: bridge
  # Environment variable holding a Figma personal access token / Dev Mode
  # token, read only when source is "rest".
  tokenEnv: FIGMA_TOKEN

codegen:
  # Output renderer for `codegen` when --target isn't passed on the command
  # line. Supported today: jsx (default), html. More are added over time —
  # run `figma-map build codegen --help` to see what your installed version
  # supports.
  target: jsx
